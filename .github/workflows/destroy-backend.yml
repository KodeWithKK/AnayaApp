name: Destroy Express Backend

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  TF_VAR_node_env: prod
  TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
  TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
  TF_VAR_better_auth_url: ${{ secrets.BETTER_AUTH_URL }}
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_smtp_host: ${{ secrets.SMTP_HOST }}
  TF_VAR_smtp_port: ${{ secrets.SMTP_PORT }}
  TF_VAR_smtp_user: ${{ secrets.SMTP_USER }}
  TF_VAR_smtp_pass: ${{ secrets.SMTP_PASS }}
  TF_VAR_smtp_from: ${{ secrets.SMTP_FROM }}

jobs:
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
