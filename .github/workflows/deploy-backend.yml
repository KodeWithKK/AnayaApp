name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "infra/**"
      - "turbo.json"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  TF_VAR_node_env: prod
  TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
  TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
  TF_VAR_better_auth_url: ${{ secrets.BETTER_AUTH_URL }}
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  TF_VAR_smtp_host: ${{ secrets.SMTP_HOST }}
  TF_VAR_smtp_port: ${{ secrets.SMTP_PORT }}
  TF_VAR_smtp_user: ${{ secrets.SMTP_USER }}
  TF_VAR_smtp_pass: ${{ secrets.SMTP_PASS }}
  TF_VAR_smtp_from: ${{ secrets.SMTP_FROM }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Root Dependencies
        run: bun install

      - name: Build API
        run: |
          cd apps/api
          node esbuild.config.js
          cd ../..

      - name: Prepare Lambda Artifact
        run: |
          mkdir -p lambda-package
          cp -r apps/api/dist/* lambda-package/

      - name: Install Production Deps
        run: |
          cd lambda-package
          npm install --omit=dev --no-package-lock --legacy-peer-deps
          cd ..

      - name: Package for Lambda
        id: package_lambda
        run: |
          cd lambda-package
          zip -r ../build.zip .
          cd ..
          PACKAGE_SIZE=$(ls -lh build.zip | awk '{print $5}')
          echo "size=$PACKAGE_SIZE" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Output Lambda URL
        id: tf_output
        working-directory: infra
        run: |
          terraform output -raw lambda_url > lambda_url.txt
          echo "lambda_url=$(cat lambda_url.txt)" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Package Size**: ${{ steps.package_lambda.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Lambda URL**: [${{ steps.tf_output.outputs.lambda_url }}](${{ steps.tf_output.outputs.lambda_url }})" >> $GITHUB_STEP_SUMMARY
